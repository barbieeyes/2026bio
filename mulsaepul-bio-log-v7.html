<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>물새풀팀 · 비오의 탐사 기록지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<style>
  :root{
    --sky:#EAF4FC; --cream:#FBF7F0;
    --water:#5AA9E6; --water-deep:#3E86C7; --leaf:#8FC66B; --leaf-deep:#6FA84C;
    --sun:#F2B441; --earth:#C8A06A; --lilac:#B39DDB;
    --ink:#3A4468; --navy:#2E3A59; --muted:#8A93AD; --pink:#F6ADC0;
    --card:#FFFFFF; --line:#E9EEF6; --shadow:0 8px 22px rgba(90,120,170,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:'Gowun Dodum',system-ui,-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    color:var(--ink);background:linear-gradient(180deg,#EAF4FC 0%,#F4F9FE 30%,var(--cream) 100%);min-height:100vh;}
  .app{max-width:660px;margin:0 auto;padding-bottom:100px;position:relative;}
  .jua{font-family:'Jua',sans-serif;}
  button{font-family:inherit;cursor:pointer;}
  .hidden{display:none!important;}

  /* 헤더 */
  header{position:relative;padding:18px 20px 58px;background:linear-gradient(160deg,#CDE8FB,#E7F3FC 60%,#F1E9FA);overflow:hidden;}
  .wave{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:36px;}
  .team-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.75);border:2px solid #fff;
    padding:5px 13px;border-radius:30px;font-size:12.5px;font-weight:700;color:var(--water-deep);box-shadow:0 3px 10px rgba(90,120,170,.12);}
  .team-badge b{color:var(--leaf-deep);}
  .hero{display:flex;gap:12px;align-items:center;margin-top:12px;position:relative;z-index:2;}
  .hero-txt{flex:1;min-width:0;}
  .hero-txt h1{font-family:'Jua',sans-serif;font-size:25px;margin:0 0 4px;color:var(--navy);line-height:1.18;letter-spacing:.5px;}
  .hero-txt h1 span{color:var(--water-deep);}
  .hero-txt p{margin:0;font-size:12px;color:#5B6a86;line-height:1.55;}
  .bio-stage{position:relative;flex:none;width:118px;padding-top:20px;text-align:center;}
  .speech{position:absolute;top:0;left:50%;transform:translateX(-50%);white-space:nowrap;background:#fff;border:2px solid #fff;
    box-shadow:0 3px 9px rgba(90,120,170,.16);border-radius:16px;padding:4px 11px;font-size:10.5px;font-weight:700;color:var(--water-deep);z-index:3;}
  .speech:after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#fff;}
  .members{margin-top:11px;display:flex;gap:7px;}
  .member{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.7);border-radius:20px;padding:4px 11px;font-size:12px;font-weight:700;color:var(--ink);}
  .member .dot{width:8px;height:8px;border-radius:50%;}

  /* 날씨 */
  .weather-card{margin:-20px 16px 0;position:relative;z-index:5;background:var(--card);border-radius:22px;box-shadow:var(--shadow);padding:15px 17px;}
  .site-tabs{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;align-items:center;}
  .site-btn{padding:7px 13px;border:2px solid var(--line);background:#fff;border-radius:16px;font-size:13px;font-weight:700;color:var(--muted);}
  .site-btn.on{border-color:var(--water);background:var(--water);color:#fff;}
  .who{display:flex;gap:5px;margin-left:auto;background:#F1F7FD;padding:3px;border-radius:16px;}
  .who button{border:none;background:none;padding:5px 11px;border-radius:13px;font-size:12.5px;font-weight:700;color:var(--muted);}
  .who button.on{background:#fff;color:var(--water-deep);box-shadow:0 2px 6px rgba(90,120,170,.15);}
  .site-desc{font-size:11.5px;color:var(--muted);margin:6px 2px 12px;}
  .wrow{display:flex;align-items:center;gap:14px;}
  .w-emoji{font-size:44px;line-height:1;}
  .w-temp{font-family:'Jua',sans-serif;font-size:34px;color:var(--navy);line-height:1;}
  .w-temp small{font-size:15px;color:var(--muted);}
  .w-cond{font-size:13px;font-weight:700;color:var(--water-deep);margin-top:2px;}
  .w-refresh{margin-left:auto;background:#F1F7FD;border:none;border-radius:14px;width:40px;height:40px;color:var(--water-deep);font-size:17px;}
  .wgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:13px;padding-top:13px;border-top:2px dashed #E9F0F8;}
  .wgrid div{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10.5px;color:var(--muted);}
  .wgrid b{font-size:14px;color:var(--ink);} .wgrid .ic{font-size:15px;}
  .w-msg{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:9px;padding:6px 2px;}
  .w-err{flex-direction:column;align-items:flex-start;gap:9px;color:#D98A5B;}

  .view{padding:16px 16px 8px;}
  .cats{display:flex;gap:8px;overflow-x:auto;padding:2px 0 8px;}
  .cat{flex:none;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:62px;padding:11px 6px;border:2.5px solid var(--line);
    background:#fff;border-radius:18px;font-size:12px;font-weight:700;color:var(--ink);}
  .cat .ce{font-size:22px;} .cat small{color:var(--muted);font-size:9.5px;font-weight:600;}

  .card{background:var(--card);border-radius:22px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px;}
  .card-title{display:flex;align-items:center;gap:8px;font-family:'Jua',sans-serif;font-size:15px;color:var(--navy);margin-bottom:13px;letter-spacing:.3px;}
  .card-title .em{font-size:18px;} .card-title .r{margin-left:auto;font-family:'Gowun Dodum';font-size:11.5px;color:var(--muted);font-weight:400;}

  .photo-drop{width:100%;border:3px dashed #C5DEF4;background:#F3F9FE;border-radius:18px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--water-deep);}
  .photo-drop .big{font-size:30px;} .photo-drop b{color:var(--ink);font-size:15px;} .photo-drop small{color:var(--muted);font-size:11.5px;}
  .photo-wrap{position:relative;border-radius:18px;overflow:hidden;}
  .photo-wrap img{width:100%;max-height:280px;object-fit:cover;display:block;}
  .photo-x{position:absolute;top:9px;right:9px;width:32px;height:32px;border:none;border-radius:50%;background:rgba(46,58,89,.6);color:#fff;font-size:17px;}

  .ai-btn{width:100%;margin-top:12px;padding:13px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--water),var(--water-deep));
    color:#fff;font-family:'Jua',sans-serif;font-size:15px;letter-spacing:.4px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 5px 14px rgba(62,134,199,.32);}
  .ai-btn:disabled{opacity:.7;}
  .ai-note{margin-top:11px;font-size:12.5px;line-height:1.55;background:#FDF3EA;color:#C77E4A;padding:10px 12px;border-radius:14px;}
  .ai-res{margin-top:12px;background:#F1FAEF;border:2px solid #DBEFCF;border-radius:18px;padding:14px;}
  .ai-res.dim{background:#F6F7FB;border-color:var(--line);}
  .ai-top{display:flex;align-items:center;gap:9px;}
  .ai-top b{font-family:'Jua',sans-serif;font-size:18px;color:var(--navy);}
  .conf{font-size:11px;font-weight:700;color:#fff;padding:2px 10px;border-radius:20px;}
  .c-높음{background:var(--leaf-deep);} .c-보통{background:var(--sun);} .c-낮음{background:#C0A38A;}
  .ai-sci{font-size:12px;color:var(--muted);font-style:italic;margin:4px 0 8px;}
  .ai-res p{margin:6px 0;font-size:13px;line-height:1.55;}
  .ai-ind{background:#EAF5FB;color:#3E7CA6;padding:9px 11px;border-radius:12px;}
  .dexlinks{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap;}
  .dexlinks a{font-size:12px;font-weight:700;color:var(--water-deep);text-decoration:none;background:#EAF4FC;padding:6px 11px;border-radius:12px;}
  .apply-btn{margin-top:9px;border:none;background:var(--leaf);color:#fff;border-radius:12px;padding:8px 14px;font-weight:700;font-size:12.5px;display:inline-flex;gap:5px;align-items:center;}
  .disc{margin-top:10px;font-size:10.5px;color:var(--muted);border-top:1px dashed var(--line);padding-top:8px;}

  .field{margin-bottom:13px;}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:6px;}
  .field input,.field textarea{width:100%;padding:11px 13px;border:2px solid var(--line);border-radius:14px;font-size:14px;font-family:inherit;background:#FBFCFE;}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--water);background:#fff;}
  .field textarea{resize:vertical;}
  .field.soga textarea{background:#FBF6FC;border-color:#EBDCF3;}
  .pills{display:flex;gap:7px;flex-wrap:wrap;}
  .pill{padding:8px 14px;border:2px solid var(--line);background:#fff;border-radius:18px;font-size:13px;color:var(--muted);font-weight:600;}
  .pill.on{border-color:var(--water);background:var(--water);color:#fff;}
  .depth-row{display:flex;gap:14px;align-items:stretch;}
  .depth-row .field{flex:1;margin-bottom:0;}
  .bio-mini{flex:none;width:74px;display:flex;flex-direction:column;align-items:center;}
  .bio-mini small{font-size:10px;color:var(--muted);margin-top:2px;}
  .biotope{display:inline-flex;align-items:center;gap:7px;padding:10px 14px;border:2.5px dashed #B7DDA6;background:#F2FAEE;border-radius:14px;font-size:13px;font-weight:700;color:var(--leaf-deep);}
  .biotope.on{background:var(--leaf);color:#fff;border-style:solid;border-color:var(--leaf);}

  .loc-actions{display:flex;gap:8px;margin-bottom:11px;}
  .gps-btn{flex:1;padding:12px;border:none;border-radius:14px;background:linear-gradient(135deg,#F4B84B,#EFA127);color:#fff;font-weight:800;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 12px rgba(239,161,39,.3);}
  .gps-btn:disabled{opacity:.7;}
  #pickMap,#mapView{width:100%;border-radius:16px;overflow:hidden;background:#E7EEF5;}
  #pickMap{height:190px;} #mapView{height:calc(100vh - 250px);min-height:340px;}
  .loc-label{margin-top:9px;font-size:12px;color:var(--ink);background:#F3F9FE;border-radius:12px;padding:8px 11px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .loc-label .tag{background:var(--leaf);color:#fff;font-size:10px;padding:1px 7px;border-radius:10px;}
  .loc-label .tag.manual{background:var(--muted);} .loc-label .tag.site{background:var(--water);}
  .coord-in{display:flex;gap:8px;margin-top:9px;}
  .coord-in label{flex:1;font-size:10.5px;color:var(--muted);display:flex;flex-direction:column;gap:3px;}
  .coord-in input{padding:8px 10px;border:2px solid var(--line);border-radius:11px;font-size:12.5px;font-family:inherit;}
  .gmaps-link{font-size:12px;color:var(--water-deep);font-weight:700;text-decoration:none;}

  .save-btn{width:100%;padding:16px;border:none;border-radius:20px;background:linear-gradient(135deg,var(--leaf),var(--leaf-deep));color:#fff;
    font-family:'Jua',sans-serif;font-size:17px;letter-spacing:.6px;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 6px 18px rgba(111,168,76,.35);}
  .save-btn:disabled{background:#CBD5C4;box-shadow:none;}

  /* 도감/사진전 */
  .seg{display:flex;gap:6px;background:#EDF3FA;padding:4px;border-radius:16px;margin-bottom:14px;}
  .seg button{flex:1;border:none;background:none;padding:9px;border-radius:12px;font-weight:700;font-size:13px;color:var(--muted);}
  .seg button.on{background:#fff;color:var(--water-deep);box-shadow:0 2px 7px rgba(90,120,170,.15);}
  .gal{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;}
  .gcell{background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
  .gcell .gimg{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:#EEF3F8;}
  .gcell .gbody{padding:9px 10px;}
  .gcell .gname{font-weight:700;font-size:13.5px;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .gcell .gmeta{font-size:10.5px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px;}
  .gcell .gwho{font-weight:700;}
  .exhibit-btn{width:100%;margin-top:14px;padding:14px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--lilac),#9B86C9);color:#fff;font-family:'Jua';font-size:15px;letter-spacing:.4px;box-shadow:0 5px 14px rgba(155,134,201,.32);}

  .refgroup{margin-bottom:16px;}
  .refgroup h4{margin:0 0 9px;font-family:'Jua';font-size:14px;color:var(--navy);display:flex;align-items:center;gap:7px;}
  .refitem{background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:11px 13px;margin-bottom:8px;}
  .refitem .rn{font-weight:700;font-size:14px;color:var(--navy);}
  .refitem .rnote{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.45;}
  .refitem .ract{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center;}
  .refitem .ract a{font-size:11.5px;font-weight:700;color:var(--water-deep);text-decoration:none;background:#EAF4FC;padding:5px 9px;border-radius:10px;}
  .refitem .addref{font-size:11.5px;font-weight:700;color:#fff;background:var(--leaf);border:none;border-radius:10px;padding:5px 10px;}

  /* 일지 */
  .day-head{display:flex;align-items:baseline;gap:9px;margin:6px 2px 11px;}
  .day-head b{font-family:'Jua',sans-serif;font-size:16px;color:var(--navy);} .day-head small{color:var(--muted);font-size:12px;}
  .log{display:flex;gap:12px;background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:12px;margin-bottom:11px;}
  .log img.thumb{width:90px;height:90px;object-fit:cover;border-radius:14px;flex:none;}
  .log-b{flex:1;min-width:0;}
  .log-top{display:flex;align-items:center;gap:8px;}
  .tag{color:#fff;font-size:10.5px;font-weight:700;padding:2px 10px;border-radius:14px;flex:none;}
  .log-top b{font-size:15px;color:var(--navy);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .del{border:none;background:none;color:#D3B7BE;font-size:15px;flex:none;padding:2px;}
  .log-sci{font-size:11.5px;color:var(--muted);font-style:italic;margin-top:2px;}
  .log-meta{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.5;}
  .log-detail{font-size:12.5px;color:var(--water-deep);font-weight:700;margin-top:5px;}
  .log-note{font-size:13.5px;margin-top:6px;line-height:1.5;}
  .log-soga{font-size:12.5px;margin-top:6px;color:#8A6BA8;background:#FBF6FC;padding:7px 9px;border-radius:10px;line-height:1.5;}
  .log-loc{font-size:11.5px;margin-top:6px;} .log-loc a{color:var(--sun);font-weight:700;text-decoration:none;}
  .log-bio{display:inline-flex;gap:4px;align-items:center;font-size:11.5px;color:var(--leaf-deep);font-weight:700;margin-top:6px;}
  .empty{text-align:center;padding:40px 20px;color:var(--muted);} .empty p{line-height:1.7;font-size:14px;margin-top:6px;}

  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .stat{background:#F6FAFE;border-radius:16px;padding:14px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .stat .se{font-size:20px;} .stat b{font-family:'Jua',sans-serif;font-size:22px;color:var(--navy);} .stat span{font-size:11px;color:var(--muted);}
  .exp-btn{width:100%;display:flex;align-items:center;gap:13px;padding:14px;border:2px solid var(--line);background:#fff;border-radius:16px;margin-bottom:10px;text-align:left;color:var(--ink);}
  .exp-btn .ee{font-size:22px;} .exp-btn b{display:block;font-size:14px;} .exp-btn small{color:var(--muted);font-size:11.5px;}
  .exp-btn:disabled{opacity:.5;} .exp-desc{font-size:12.5px;color:var(--muted);margin:0 0 13px;line-height:1.55;}

  .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:660px;background:rgba(255,255,255,.94);
    backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:40;}
  .nav button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:var(--muted);font-size:10.5px;font-weight:700;position:relative;}
  .nav button .ne{font-size:19px;} .nav button.on{color:var(--water-deep);}
  .nav .cnt{position:absolute;top:0;right:22%;background:var(--pink);color:#fff;font-size:9px;font-weight:700;padding:0 5px;border-radius:9px;line-height:15px;}

  .toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 22px;border-radius:24px;font-size:13.5px;font-weight:700;z-index:120;box-shadow:0 8px 22px rgba(0,0,0,.22);}
  .zoom{position:fixed;inset:0;background:rgba(20,30,50,.92);display:flex;align-items:center;justify-content:center;z-index:130;padding:18px;flex-direction:column;}
  .zoom img{max-width:100%;max-height:72%;border-radius:12px;}
  .zoom .zmeta{color:#fff;text-align:center;margin-top:14px;max-width:420px;}
  .zoom .zmeta b{font-family:'Jua';font-size:19px;} .zoom .zmeta .zsci{color:#B8C6DD;font-style:italic;font-size:13px;margin-top:2px;}
  .zoom .zmeta p{font-size:13px;color:#DCE4EF;margin:8px 0;line-height:1.5;}
  .zoom .dexlinks{justify-content:center;}
  .foot{text-align:center;font-size:10.5px;color:var(--muted);padding:16px;line-height:1.7;}
  .leaflet-popup-content{margin:10px 12px;font-family:'Gowun Dodum',sans-serif;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
<style>
/* ===== 귀엽·상큼·큰글씨 오버라이드 ===== */
body{font-size:16px;background:
 radial-gradient(1100px 420px at 6% -8%,#FFE1EE 0%,rgba(255,225,238,0) 55%),
 radial-gradient(900px 400px at 106% 3%,#D8F6E6 0%,rgba(216,246,230,0) 55%),
 radial-gradient(820px 520px at 50% 114%,#FFF0D4 0%,rgba(255,240,212,0) 60%),
 linear-gradient(180deg,#E8F5FF 0%,#F3FAFF 42%,#FCF8F1 100%);background-attachment:fixed;}
header{background:linear-gradient(160deg,#BCE6FF 0%,#D8F4E8 46%,#FCE1EE 100%);}
.team-badge{font-size:13px;}
.bio-stage{padding-top:28px;}
.hero-txt h1{font-size:29px;line-height:1.16;}
.hero-txt p{font-size:13px;}
.member{font-size:13.5px;}
.speech{font-family:'Gaegu',cursive;font-size:15px;font-weight:700;padding:5px 13px;}
/* 통통 튀는 비오 */
#bioHero{display:inline-block;transform-origin:bottom center;animation:bioBounce 2.1s ease-in-out infinite;}
.empty svg{display:inline-block;transform-origin:bottom center;animation:bioBounce 2.6s ease-in-out infinite;}
@keyframes bioBounce{
 0%{transform:translateY(0) scale(1,1)}
 16%{transform:translateY(-11px) scale(.97,1.04)}
 34%{transform:translateY(0) scale(1.04,.96)}
 52%{transform:translateY(-5px) scale(1,1)}
 70%{transform:translateY(0) scale(1.02,.99)}
 100%{transform:translateY(0) scale(1,1)}}
/* 큰 글씨 */
.site-btn{font-size:14.5px;padding:8px 15px;}
.who button{font-size:13.5px;padding:6px 12px;}
.site-desc{font-size:12.5px;}
.w-emoji{font-size:48px;}
.w-temp{font-size:40px;} .w-cond{font-size:14.5px;} .wgrid b{font-size:15px;} .wgrid div{font-size:11.5px;}
.card{border:2px solid #fff;}
.card-title{font-size:17px;}
.cats{gap:9px;}
.cat{font-size:13px;min-width:66px;} .cat .ce{font-size:26px;} .cat small{font-size:10.5px;}
.field label{font-size:13.5px;} .field input,.field textarea{font-size:15.5px;padding:12px 14px;border-radius:15px;}
.pill{font-size:14px;padding:9px 15px;}

  const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),8000);
  try{const r=await fetch(url,{signal:ctrl.signal});clearTimeout(t);if(!r.ok)throw new Error("응답 "+r.status);
    const d=await r.json();if(!d.current)throw new Error("형식");return d.current;}catch(e){clearTimeout(t);throw e;}}

function processImage(file,maxDim=1024,q=.82){return new Promise((res,rej)=>{const rd=new FileReader();
  rd.onload=e=>{const img=new Image();img.onload=()=>{let{width:w,height:h}=img;
    if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}else if(h>=w&&h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
    const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);res(c.toDataURL("image/jpeg",q));};
    img.onerror=rej;img.src=e.target.result;};rd.onerror=rej;rd.readAsDataURL(file);});}
async function identifySpecies(dataUrl,cat){
  const b64=dataUrl.split(",")[1];
  const hint=cat==="plant"?"식물(수변식물·습지식물·초본·목본)":cat==="animal"?"동물(어류·양서류·곤충·조류·저서생물)":"생물";
  const prompt=`당신은 한국 도시하천 생태계 전문 생물 분류학자입니다.
이 사진은 위례 장지천/창곡천(남한산성 수계, 탄천 유입) 습지 현장에서 촬영한 ${hint} 표본입니다.
사진 속 생물을 한국에서 실제 관찰 가능한 종 기준으로 식별하세요.
반드시 아래 JSON 형식으로만 답하세요(마크다운·코드펜스·설명 없이 JSON만):
{"identified":true/false,"common_name":"국명","scientific_name":"학명","group":"식물|곤충|어류|양서류|파충류|조류|포유류|저서무척추동물|기타","confidence":"높음|보통|낮음","features":"사진 속 식별 근거·형태 특징 2~3문장","similar":"혼동 유사종(없으면 빈칸)","indicator":"이 종의 수질/환경 지표성이나 하천 생태에서의 의미 1~2문장"}
식별이 어려우면 identified를 false로 두고 후보와 필요한 추가 사진 각도를 features에 적으세요.`;
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},{type:"text",text:prompt}]}]})});
  if(!r.ok)throw new Error("AI "+r.status);
  const d=await r.json();const txt=(d.content||[]).map(i=>i.type==="text"?i.text:"").join("\n");
  const clean=txt.replace(/```json/gi,"").replace(/```/g,"").trim();
  try{return JSON.parse(clean);}catch(e){return{identified:false,common_name:"",scientific_name:"",group:"",confidence:"낮음",features:clean.slice(0,300),similar:"",indicator:""};}}

function initPickMap(){const el=document.getElementById("pickMap");if(!el)return;

  const c=state.draftLoc?[state.draftLoc.lat,state.draftLoc.lon]:[state.site.lat,state.site.lon];

  state.pickMarker=L.marker(c,{draggable:true}).addTo(state.pickMap);

  setTimeout(()=>state.pickMap.invalidateSize(),120);}
async function saveObservation(){const f=state.category;
  const ok=f==="water"?(draft.depth||draft.turbidity||draft.note):f==="soil"?(draft.soiltype||draft.soilcolor||draft.note):(draft.species||draft.note||state.photo);

  .ft{text-align:center;color:#8A93AD;font-size:12px;padding:24px}</style></head>
  <body><div class="hd"><h1>🖼️ 물새풀팀 디지털 생물다양성 사진전</h1>
  <p>위례 장지천·창곡천 습지에서 만난 생명들</p><p class="sub">현정 · 영현 · 총 ${specs.length}점 · ${uniq.size}종 · ${new Date().toLocaleDateString("ko-KR")}</p></div>
  <div class="grid">${cards}</div><div class="ft">🌱 물과 풀, 새가 어우러진 습지를 지키는 우리가 될 거예요 · 마스코트 비오와 함께</div></body></html>`;
  download(`물새풀_사진전_${new Date().toISOString().slice(0,10)}.html`,html,"text/html;charset=utf-8;");
  toast("디지털 사진전 페이지를 만들었어요! 🎨");}

/* ===== 로그인 게이트 ===== */
function renderGate(){const g=document.getElementById("gate");g.className="";
  g.innerHTML=`<div class="gate-card" id="gateCard">
    <div class="gate-bio">${bioSVG(.62,"happy",118,"login",true)}</div>
    <div class="gate-title">물새풀팀 · 비오의 기록지</div>
    <div class="gate-sub">비오와 함께 습지를 탐구해요 🌿</div>
    <div class="seg gate-seg"><button data-lm="editor" class="${state.loginMode==='editor'?'on':''}">✏️ 팀원 (편집)</button><button data-lm="guest" class="${state.loginMode==='guest'?'on':''}">👀 손님 (둘러보기)</button></div>
    ${state.loginMode==='editor'?`
      <div class="gate-names">${WHO.map(n=>`<button data-ln="${n}" class="gate-name ${state.loginName===n?'on':''}">${n}</button>`).join("")}</div>
      <input id="pwIn" class="gate-pw" type="password" inputmode="numeric" maxlength="4" placeholder="● ● ● ●" value="${esc(state.loginPw)}">
      <button class="gate-go" id="gateGo">🔑 입장해서 편집하기</button>
      <div class="gate-msg" id="gateMsg"></div>`
    :`<p class="gate-guestmsg">손님은 우리 팀의 기록과 사진전을 둘러볼 수 있어요.<br>편집·저장은 팀원(최영현·박현정·이정연)만 가능해요 🙂</p>
      <button class="gate-go guest" id="gateGuest">👀 둘러보기로 입장하기</button>`}
  </div>`;
  wireGate();}
function wireGate(){
  document.querySelectorAll("[data-lm]").forEach(b=>b.onclick=()=>{state.loginMode=b.dataset.lm;renderGate();});
  document.querySelectorAll("[data-ln]").forEach(b=>b.onclick=()=>{state.loginName=b.dataset.ln;renderGate();});
  const pw=document.getElementById("pwIn");if(pw){pw.oninput=e=>state.loginPw=e.target.value;pw.onkeydown=e=>{if(e.key==="Enter")tryLogin();};}
  const go=document.getElementById("gateGo");if(go)go.onclick=tryLogin;
  const gg=document.getElementById("gateGuest");if(gg)gg.onclick=()=>enter("guest",null);}
function tryLogin(){const msg=document.getElementById("gateMsg");
  if(!WHO.includes(state.loginName)){if(msg)msg.textContent="이름을 먼저 골라줘!";return;}
  if(state.loginPw!=="2144"){if(msg)msg.textContent="비밀번호가 달라요 🥺";const c=document.getElementById("gateCard");c.classList.remove("shake");void c.offsetWidth;c.classList.add("shake");return;}
  enter("editor",state.loginName);}
function enter(role,name){state.auth={role,name};state.readonly=role==="guest";if(name)state.who=name;
  state.tab=role==="guest"?"dex":"record";state.dexTab="gallery";state.loginPw="";
  document.getElementById("gate").className="gone";
  renderSiteTabs();renderUserBar();renderNav();renderView();}
function renderUserBar(){const el=document.getElementById("userbar");if(!el)return;
  if(!state.auth){el.innerHTML="";return;}const ed=state.auth.role==="editor";
  el.innerHTML=`<span class="ub-who">${ed?`✏️ ${esc(state.auth.name)} · 편집 모드`:"👀 손님 · 둘러보기 모드"}</span>
    <button class="ub-switch" id="ubSwitch">${ed?"나가기":"팀원으로 입장"}</button>`;
  document.getElementById("ubSwitch").onclick=()=>{state.loginMode="editor";document.getElementById("gate").className="";renderGate();};}

/* ===== 초기화 ===== */
async function init(){renderSiteTabs();renderHeroBio();renderNav();
  const meta=await store.get("wsp_meta");if(meta&&meta.who&&WHO.includes(meta.who)){state.who=meta.who;renderSiteTabs();}
  await loadAllObs();state.loaded=true;
  state.draftLoc=siteLoc();renderHeroBio();renderView();renderNav();renderUserBar();renderGate();loadWeather();}
init();
</script>
