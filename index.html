<style>
  :root{
    --sky:#EAF4FC; --cream:#FBF7F0;
    --water:#5AA9E6; --water-deep:#3E86C7; --leaf:#8FC66B; --leaf-deep:#6FA84C;
    --sun:#F2B441; --earth:#C8A06A; --lilac:#B39DDB;
    --ink:#3A4468; --navy:#2E3A59; --muted:#8A93AD; --pink:#F6ADC0;
    --card:#FFFFFF; --line:#E9EEF6; --shadow:0 8px 22px rgba(90,120,170,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:'Gowun Dodum',system-ui,-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    color:var(--ink);background:linear-gradient(180deg,#EAF4FC 0%,#F4F9FE 30%,var(--cream) 100%);min-height:100vh;}
  .app{max-width:660px;margin:0 auto;padding-bottom:100px;position:relative;}
  .jua{font-family:'Jua',sans-serif;}
  button{font-family:inherit;cursor:pointer;}
  .hidden{display:none!important;}

  /* 헤더 */
  header{position:relative;padding:18px 20px 58px;background:linear-gradient(160deg,#CDE8FB,#E7F3FC 60%,#F1E9FA);overflow:hidden;}
  .wave{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:36px;}
  .team-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.75);border:2px solid #fff;
    padding:5px 13px;border-radius:30px;font-size:12.5px;font-weight:700;color:var(--water-deep);box-shadow:0 3px 10px rgba(90,120,170,.12);}
  .team-badge b{color:var(--leaf-deep);}
  .hero{display:flex;gap:12px;align-items:center;margin-top:12px;position:relative;z-index:2;}
  .hero-txt{flex:1;min-width:0;}
  .hero-txt h1{font-family:'Jua',sans-serif;font-size:25px;margin:0 0 4px;color:var(--navy);line-height:1.18;letter-spacing:.5px;}
  .hero-txt h1 span{color:var(--water-deep);}
  .hero-txt p{margin:0;font-size:12px;color:#5B6a86;line-height:1.55;}
  .bio-stage{position:relative;flex:none;width:118px;padding-top:20px;text-align:center;}
  .speech{position:absolute;top:0;left:50%;transform:translateX(-50%);white-space:nowrap;background:#fff;border:2px solid #fff;
    box-shadow:0 3px 9px rgba(90,120,170,.16);border-radius:16px;padding:4px 11px;font-size:10.5px;font-weight:700;color:var(--water-deep);z-index:3;}
  .speech:after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#fff;}
  .members{margin-top:11px;display:flex;gap:7px;}
  .member{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.7);border-radius:20px;padding:4px 11px;font-size:12px;font-weight:700;color:var(--ink);}
  .member .dot{width:8px;height:8px;border-radius:50%;}

  /* 날씨 */
  .weather-card{margin:-20px 16px 0;position:relative;z-index:5;background:var(--card);border-radius:22px;box-shadow:var(--shadow);padding:15px 17px;}
  .site-tabs{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;align-items:center;}
  .site-btn{padding:7px 13px;border:2px solid var(--line);background:#fff;border-radius:16px;font-size:13px;font-weight:700;color:var(--muted);}
  .site-btn.on{border-color:var(--water);background:var(--water);color:#fff;}
  .who{display:flex;gap:5px;margin-left:auto;background:#F1F7FD;padding:3px;border-radius:16px;}
  .who button{border:none;background:none;padding:5px 11px;border-radius:13px;font-size:12.5px;font-weight:700;color:var(--muted);}
  .who button.on{background:#fff;color:var(--water-deep);box-shadow:0 2px 6px rgba(90,120,170,.15);}
  .site-desc{font-size:11.5px;color:var(--muted);margin:6px 2px 12px;}
  .wrow{display:flex;align-items:center;gap:14px;}
  .w-emoji{font-size:44px;line-height:1;}
  .w-temp{font-family:'Jua',sans-serif;font-size:34px;color:var(--navy);line-height:1;}
  .w-temp small{font-size:15px;color:var(--muted);}
  .w-cond{font-size:13px;font-weight:700;color:var(--water-deep);margin-top:2px;}
  .w-refresh{margin-left:auto;background:#F1F7FD;border:none;border-radius:14px;width:40px;height:40px;color:var(--water-deep);font-size:17px;}
  .wgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:13px;padding-top:13px;border-top:2px dashed #E9F0F8;}
  .wgrid div{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10.5px;color:var(--muted);}
  .wgrid b{font-size:14px;color:var(--ink);} .wgrid .ic{font-size:15px;}
  .w-msg{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:9px;padding:6px 2px;}
  .w-err{flex-direction:column;align-items:flex-start;gap:9px;color:#D98A5B;}

  .view{padding:16px 16px 8px;}
  .cats{display:flex;gap:8px;overflow-x:auto;padding:2px 0 8px;}
  .cat{flex:none;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:62px;padding:11px 6px;border:2.5px solid var(--line);
    background:#fff;border-radius:18px;font-size:12px;font-weight:700;color:var(--ink);}
  .cat .ce{font-size:22px;} .cat small{color:var(--muted);font-size:9.5px;font-weight:600;}

  .card{background:var(--card);border-radius:22px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px;}
  .card-title{display:flex;align-items:center;gap:8px;font-family:'Jua',sans-serif;font-size:15px;color:var(--navy);margin-bottom:13px;letter-spacing:.3px;}
  .card-title .em{font-size:18px;} .card-title .r{margin-left:auto;font-family:'Gowun Dodum';font-size:11.5px;color:var(--muted);font-weight:400;}

  .photo-drop{width:100%;border:3px dashed #C5DEF4;background:#F3F9FE;border-radius:18px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--water-deep);}
  .photo-drop .big{font-size:30px;} .photo-drop b{color:var(--ink);font-size:15px;} .photo-drop small{color:var(--muted);font-size:11.5px;}
  .photo-wrap{position:relative;border-radius:18px;overflow:hidden;}
  .photo-wrap img{width:100%;max-height:280px;object-fit:cover;display:block;}
  .photo-x{position:absolute;top:9px;right:9px;width:32px;height:32px;border:none;border-radius:50%;background:rgba(46,58,89,.6);color:#fff;font-size:17px;}

  .ai-btn{width:100%;margin-top:12px;padding:13px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--water),var(--water-deep));
    color:#fff;font-family:'Jua',sans-serif;font-size:15px;letter-spacing:.4px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 5px 14px rgba(62,134,199,.32);}
  .ai-btn:disabled{opacity:.7;}
  .ai-note{margin-top:11px;font-size:12.5px;line-height:1.55;background:#FDF3EA;color:#C77E4A;padding:10px 12px;border-radius:14px;}
  .ai-res{margin-top:12px;background:#F1FAEF;border:2px solid #DBEFCF;border-radius:18px;padding:14px;}
  .ai-res.dim{background:#F6F7FB;border-color:var(--line);}
  .ai-top{display:flex;align-items:center;gap:9px;}
  .ai-top b{font-family:'Jua',sans-serif;font-size:18px;color:var(--navy);}
  .conf{font-size:11px;font-weight:700;color:#fff;padding:2px 10px;border-radius:20px;}
  .c-높음{background:var(--leaf-deep);} .c-보통{background:var(--sun);} .c-낮음{background:#C0A38A;}
  .ai-sci{font-size:12px;color:var(--muted);font-style:italic;margin:4px 0 8px;}
  .ai-res p{margin:6px 0;font-size:13px;line-height:1.55;}
  .ai-ind{background:#EAF5FB;color:#3E7CA6;padding:9px 11px;border-radius:12px;}
  .dexlinks{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap;}
  .dexlinks a{font-size:12px;font-weight:700;color:var(--water-deep);text-decoration:none;background:#EAF4FC;padding:6px 11px;border-radius:12px;}
  .apply-btn{margin-top:9px;border:none;background:var(--leaf);color:#fff;border-radius:12px;padding:8px 14px;font-weight:700;font-size:12.5px;display:inline-flex;gap:5px;align-items:center;}
  .disc{margin-top:10px;font-size:10.5px;color:var(--muted);border-top:1px dashed var(--line);padding-top:8px;}

  .field{margin-bottom:13px;}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:6px;}
  .field input,.field textarea{width:100%;padding:11px 13px;border:2px solid var(--line);border-radius:14px;font-size:14px;font-family:inherit;background:#FBFCFE;}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--water);background:#fff;}
  .field textarea{resize:vertical;}
  .field.soga textarea{background:#FBF6FC;border-color:#EBDCF3;}
  .pills{display:flex;gap:7px;flex-wrap:wrap;}
  .pill{padding:8px 14px;border:2px solid var(--line);background:#fff;border-radius:18px;font-size:13px;color:var(--muted);font-weight:600;}
  .pill.on{border-color:var(--water);background:var(--water);color:#fff;}
  .depth-row{display:flex;gap:14px;align-items:stretch;}
  .depth-row .field{flex:1;margin-bottom:0;}
  .bio-mini{flex:none;width:74px;display:flex;flex-direction:column;align-items:center;}
  .bio-mini small{font-size:10px;color:var(--muted);margin-top:2px;}

const mem={};
let HASLS=false; try{localStorage.setItem("__wsp_t","1");localStorage.removeItem("__wsp_t");HASLS=true;}catch(e){HASLS=false;}
const store={
  async set(k,v,sh){const s=JSON.stringify(v);
    if(HASLS){try{localStorage.setItem(k,s);return;}catch(e){}}
    try{if(window.storage){await window.storage.set(k,s,true);return;}}catch(e){} mem[k]=v;},
  async get(k,sh){
    if(HASLS){try{const s=localStorage.getItem(k);return s?JSON.parse(s):null;}catch(e){}}
    try{if(window.storage){const r=await window.storage.get(k,true);return r?JSON.parse(r.value):null;}}catch(e){} return mem[k]??null;},
  async del(k,sh){
    if(HASLS){try{localStorage.removeItem(k);return;}catch(e){}}
    try{if(window.storage){await window.storage.delete(k,true);return;}}catch(e){} delete mem[k];},
  async list(p,sh){
    if(HASLS){try{return Object.keys(localStorage).filter(k=>k.startsWith(p));}catch(e){}}
    try{if(window.storage){const r=await window.storage.list(p,true);return(r&&r.keys)||[];}}catch(e){} return Object.keys(mem).filter(k=>k.startsWith(p));},
};

  const lw=state.observations.find(o=>o.category==="water"&&o.fields.depth);

function processImage(file,maxDim=1024,q=.82){return new Promise((res,rej)=>{const rd=new FileReader();
  rd.onload=e=>{const img=new Image();img.onload=()=>{let{width:w,height:h}=img;
    if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}else if(h>=w&&h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
    const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);res(c.toDataURL("image/jpeg",q));};
    img.onerror=rej;img.src=e.target.result;};rd.onerror=rej;rd.readAsDataURL(file);});}
async function identifySpecies(dataUrl,cat){
  const b64=dataUrl.split(",")[1];
  const hint=cat==="plant"?"식물(수변식물·습지식물·초본·목본)":cat==="animal"?"동물(어류·양서류·곤충·조류·저서생물)":"생물";
  const prompt=`당신은 한국 도시하천 생태계 전문 생물 분류학자입니다.
이 사진은 위례 장지천/창곡천(남한산성 수계, 탄천 유입) 습지 현장에서 촬영한 ${hint} 표본입니다.
사진 속 생물을 한국에서 실제 관찰 가능한 종 기준으로 식별하세요.
반드시 아래 JSON 형식으로만 답하세요(마크다운·코드펜스·설명 없이 JSON만):
{"identified":true/false,"common_name":"국명","scientific_name":"학명","group":"식물|곤충|어류|양서류|파충류|조류|포유류|저서무척추동물|기타","confidence":"높음|보통|낮음","features":"사진 속 식별 근거·형태 특징 2~3문장","similar":"혼동 유사종(없으면 빈칸)","indicator":"이 종의 수질/환경 지표성이나 하천 생태에서의 의미 1~2문장"}
식별이 어려우면 identified를 false로 두고 후보와 필요한 추가 사진 각도를 features에 적으세요.`;
  const parse=txt=>{const clean=(txt||"").replace(/```json/gi,"").replace(/```/g,"").trim();try{return JSON.parse(clean);}catch(e){return{identified:false,common_name:"",scientific_name:"",group:"",confidence:"낮음",features:clean.slice(0,300),similar:"",indicator:""};}};
  const key=(state.aiKey||"").trim();
  // Google Gemini 키
  if(key.startsWith("AIza")){
    const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${encodeURIComponent(key)}`;
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      contents:[{parts:[{inline_data:{mime_type:"image/jpeg",data:b64}},{text:prompt}]}],generationConfig:{temperature:0.2,maxOutputTokens:800}})});
    if(!r.ok){let t="";try{t=await r.text();}catch(_){} throw new Error("Gemini "+r.status+(t?" · "+t.slice(0,180):""));}
    const d=await r.json();const cand=(d.candidates||[])[0]||{};const parts=((cand.content||{}).parts)||[];
    return parse(parts.map(p=>p.text||"").join(""));
  }
  // Claude(Anthropic) API 키 — 브라우저 직접 호출
  if(key){
    const models=["claude-sonnet-5","claude-3-5-sonnet-latest","claude-haiku-4-5-20251001"];
    let lastErr="";
    for(const m of models){
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{
        "content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:m,max_tokens:1000,messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},{type:"text",text:prompt}]}]})});
      if(r.ok){const d=await r.json();return parse((d.content||[]).map(i=>i.type==="text"?i.text:"").join("\n"));}
      let t="";try{t=await r.text();}catch(_){} lastErr="HTTP "+r.status+(t?" · "+t.slice(0,180):"");
      if(r.status!==404) break;
    }
    throw new Error(lastErr||"Anthropic 요청 실패");
  }
  // 키가 없을 때: 라이브 아티팩트 프록시 시도
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},{type:"text",text:prompt}]}]})});
  if(!r.ok){let t="";try{t=await r.text();}catch(_){} throw new Error("HTTP "+r.status+(t?" · "+t.slice(0,180):""));}
  const d=await r.json();return parse((d.content||[]).map(i=>i.type==="text"?i.text:"").join("\n"));}

    <a href="https://www.google.com/search?tbm=isch&q=${q}" target="_blank" rel="noopener">🖼️ 이미지 비교</a></div>`;}

    return `<div class="depth-row"><div class="field"><label>수심 (cm)</label><input id="f_depth" type="number" inputmode="decimal" placeholder="예: 24" value="${esc(draft.depth)}"></div>
      <div class="bio-mini">${bioSVG(lvl,"neutral",60,"d")}<small>비오의 수위</small></div></div>
      <div class="field"><label>물색 / 탁도</label>${selectHTML("turbidity",draft.turbidity,["맑음","약간 흐림","흐림","매우 탁함"])}</div>
      <div class="field"><label>수온 (℃)</label><input id="f_watertemp" type="number" inputmode="decimal" placeholder="예: 18.5" value="${esc(draft.watertemp)}"></div>
      <div class="field" style="margin-bottom:0"><label>유속</label>${selectHTML("flow",draft.flow,["정체","느림","보통","빠름"])}</div>`;}
  if(c==="plant"||c==="animal")return `<div class="field"><label>개체수 / 규모</label><input id="f_count" placeholder="${c==='plant'?'예: 소군락, 약 15개체':'예: 3마리'}" value="${esc(draft.count)}"></div>
    ${c==='plant'?`<div class="field"><label>관찰 위치</label>${selectHTML("position",draft.position,["수중","수변부","둔치","제방","기타"])}</div>`:`<div class="field"><label>행동 / 상태</label><input id="f_behavior" placeholder="예: 수면 유영, 돌 밑 은신" value="${esc(draft.behavior)}"></div>`}
    <button type="button" class="biotope ${draft.biotope?'on':''}" id="bioToggle">🌱 학교 비오톱 후보종으로 표시 ${draft.biotope?'✓':''}</button>`;
  if(c==="soil")return `<div class="field"><label>토양 종류</label>${selectHTML("soiltype",draft.soiltype,["모래","진흙","자갈","부식토","혼합"])}</div>
    <div class="field"><label>토양 색</label><input id="f_soilcolor" placeholder="예: 짙은 갈색" value="${esc(draft.soilcolor)}"></div>
    <div class="field" style="margin-bottom:0"><label>습도</label>${selectHTML("soilmoist",draft.soilmoist,["건조","보통","습함","젖음"])}</div>`;
  return `<div class="field"><label>제목</label><input id="f_title" placeholder="관찰 대상 / 현상" value="${esc(draft.title)}"></div>
    <button type="button" class="biotope ${draft.biotope?'on':''}" id="bioToggle">🌱 비오톱 후보로 표시 ${draft.biotope?'✓':''}</button>`;}
function wireRecord(){
  document.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>{state.category=b.dataset.cat;draft=emptyDraft();state.photo=null;state.aiRes=null;state.aiState="idle";renderView();});
  wirePickButtons();
  const onPhoto=async e=>{const f=e.target.files&&e.target.files[0];if(!f)return;try{state.photo=await processImage(f);state.aiState="idle";state.aiRes=null;refreshPhotoAI();}catch(_){toast("사진을 불러오지 못했어요");}e.target.value="";};
  document.getElementById("fileIn").onchange=onPhoto;document.getElementById("fileInGal").onchange=onPhoto;
  wireAI();wireFields();
  document.getElementById("gpsBtn").onclick=captureGPS;
  const sc=document.getElementById("setCenterBtn");if(sc)sc.onclick=()=>{if(state.pickMap){const c=state.pickMap.getCenter();setDraftLoc(c.lat,c.lng,null,"manual");toast("지도 가운데 위치로 지정했어요 📍");}else toast("지도를 불러오지 못했어요.");};
  document.getElementById("f_note").oninput=e=>draft.note=e.target.value;
  document.getElementById("f_soga").oninput=e=>draft.reflection=e.target.value;
  document.getElementById("saveBtn").onclick=saveObservation;renderLocLabel();}
function refreshPhotoAI(){document.getElementById("photoArea").innerHTML=photoArea();document.getElementById("aiArea").innerHTML=aiArea();
  wirePickButtons();wireAI();wireZoom();}
function wirePickButtons(){const c=document.getElementById("pickCam");if(c)c.onclick=()=>document.getElementById("fileIn").click();
  const a=document.getElementById("pickAlb");if(a)a.onclick=()=>document.getElementById("fileInGal").click();
  const rm=document.getElementById("rmPhoto");if(rm)rm.onclick=()=>{state.photo=null;state.aiRes=null;state.aiState="idle";refreshPhotoAI();};}
function wireAI(){const b=document.getElementById("aiBtn");
  if(b)b.onclick=async()=>{if(!state.photo)return;state.aiState="loading";refreshPhotoAI();
    try{const r=await identifySpecies(state.photo,state.category);state.aiRes=r;state.aiState="ok";if(r.identified&&r.common_name&&!draft.species)draft.species=r.common_name;}
    catch(e){state.aiState="error";state.aiErr=(e&&e.message)||String(e);}refreshPhotoAI();syncSpecies();};
  const ap=document.getElementById("applySpecies");if(ap)ap.onclick=()=>{draft.species=state.aiRes.common_name;syncSpecies();toast("종 이름을 넣었어요 ✓");};
  const rt=document.getElementById("aiRetry");if(rt)rt.onclick=()=>{const bb=document.getElementById("aiBtn");if(bb)bb.click();};}
function syncSpecies(){const sp=document.getElementById("f_species");if(sp)sp.value=draft.species;}
function wireFields(){[["f_depth","depth"],["f_watertemp","watertemp"],["f_species","species"],["f_count","count"],["f_behavior","behavior"],["f_soilcolor","soilcolor"],["f_title","title"]]
    .forEach(([id,k])=>{const el=document.getElementById(id);if(el)el.oninput=e=>{draft[k]=e.target.value;if(k==="depth")updateDepthBio();};});
  document.querySelectorAll("[data-sel]").forEach(b=>b.onclick=()=>{const k=b.dataset.sel;draft[k]=draft[k]===b.dataset.val?"":b.dataset.val;document.getElementById("fieldsArea").innerHTML=fieldsArea();wireFields();});
  const bt=document.getElementById("bioToggle");if(bt)bt.onclick=()=>{draft.biotope=!draft.biotope;document.getElementById("fieldsArea").innerHTML=fieldsArea();wireFields();};}
function updateDepthBio(){const box=document.querySelector(".bio-mini svg");if(box){const lvl=clamp(Number(draft.depth||0)/60,.05,1);box.outerHTML=bioSVG(lvl,"neutral",60,"d");}}
function initPickMap(){const el=document.getElementById("pickMap");if(!el)return;
  if(!window.L){el.innerHTML=`<div style="padding:20px;text-align:center;color:var(--muted);font-size:12.5px">지도를 불러오지 못했어요.<br>위·경도를 직접 입력하거나 GPS 버튼을 눌러요.</div>`;return;}
  const c=state.draftLoc?[state.draftLoc.lat,state.draftLoc.lon]:[state.site.lat,state.site.lon];
  state.pickMap=L.map(el,{zoomControl:true}).setView(c,16);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(state.pickMap);
  state.pickMarker=L.marker(c,{draggable:true}).addTo(state.pickMap);
  state.pickMap.on("click",e=>setDraftLoc(e.latlng.lat,e.latlng.lng,null,"manual"));
  state.pickMarker.on("dragend",e=>{const p=e.target.getLatLng();setDraftLoc(p.lat,p.lng,null,"manual");});
  setTimeout(()=>state.pickMap.invalidateSize(),120);}
async function saveObservation(){if(state.readonly){toast("손님은 저장할 수 없어요 🙂");return;}const f=state.category;
  const ok=f==="water"?(draft.depth||draft.turbidity||draft.note):f==="soil"?(draft.soiltype||draft.soilcolor||draft.note):(draft.species||draft.note||state.photo);
  if(!ok){toast("관찰한 내용을 조금만 적어줄래요? 🌱");return;}
  const obs={id:uid(),ts:Date.now(),category:f,who:state.who,site:state.site.name,location:state.draftLoc?{...state.draftLoc}:siteLoc(),
    fields:{...draft},photo:state.photo,ai:state.aiRes,
    weather:state.weather?{temp:state.weather.temperature_2m,humidity:state.weather.relative_humidity_2m,precip:state.weather.precipitation,wind:state.weather.wind_speed_10m,code:state.weather.weather_code}:null};
  state.observations.unshift(obs);await store.set("wsp_obs_"+obs.id,obs,true);
  draft=emptyDraft();state.photo=null;state.aiRes=null;state.aiState="idle";state.draftLoc=siteLoc();
  renderHeroBio();renderView();renderNav();toast("비오가 기록을 저장했어요! 🌿");}

/* ===== 도감/사진전 뷰 ===== */
function dexView(){return `
  <div class="seg"><button data-dex="gallery" class="${state.dexTab==='gallery'?'on':''}">🖼️ 우리 사진전</button>
    <button data-dex="ref" class="${state.dexTab==='ref'?'on':''}">📚 참고 도감</button></div>
  ${state.dexTab==="gallery"?galleryView():refView()}`;}
function galleryView(){
  const specs=state.observations.filter(o=>o.photo&&(o.category==="animal"||o.category==="plant"||o.category==="etc"));
  let h=state.readonly?"":`<div class="card"><div class="card-title"><span class="em">📸</span> AI로 생물 추가<span class="r">촬영: ${state.who}</span></div>
    ${bioGuide("찰칵! 사진을 찍으면 내가 이름을 찾아볼게 📸")}
    <div id="qPhotoArea">${qPhotoArea()}</div><input type="file" id="qFileIn" accept="image/*" capture="environment" class="hidden"><input type="file" id="qFileInGal" accept="image/*" class="hidden"><div id="qAiArea">${qAiArea()}</div>
    <div class="field" style="margin-top:12px"><label>종 이름</label><input id="q_species" placeholder="AI 결과 또는 직접 입력" value="${esc(state.qSpecies)}"></div>
    <div class="field"><label>분류</label><div class="pills">${["animal","plant","etc"].map(c=>`<button type="button" class="pill ${state.qCat===c?'on':''}" data-qcat="${c}">${CATS[c].emoji} ${CATS[c].full}</button>`).join("")}</div></div>
    <div class="field" style="margin-bottom:0"><label>메모 (선택)</label><input id="q_note" placeholder="관찰 장소·특징" value="${esc(state.qNote)}"></div>
    <button class="save-btn" id="qSave" style="margin-top:14px">🖼️ 사진전에 추가</button>
    <p style="font-size:11px;color:var(--muted);margin:9px 2px 0">위치는 ${state.site.name} 기준으로 저장돼요. 정밀 GPS는 ‘기록’ 탭에서 남길 수 있어요.</p></div>`;
  h+=`<div class="card-title" style="padding:0 2px"><span class="em">🦋</span> 우리 팀 생물 사진전 <span class="r">${specs.length}종 수집</span></div>`;
  if(!specs.length)h+=`<div class="empty">${bioSVG(.55,"happy",96,"g")}<p>아직 사진이 없어요.<br>위에서 첫 생물을 추가해 사진전을 채워요!</p></div>`;
  else{h+=`<div class="gal">${specs.map(o=>{const f=o.fields||{};return `<div class="gcell" data-open="${o.id}">
    <img class="gimg" src="${o.photo}"><div class="gbody"><div class="gname">${esc(f.species||f.title||CATS[o.category].full)}</div>
    <div class="gmeta"><span class="gwho" style="color:${whoDot(o.who)}">${esc(o.who||"")}</span>· ${new Date(o.ts).toLocaleDateString("ko-KR",{month:"numeric",day:"numeric"})} · ${esc(o.site||"")}</div></div></div>`;}).join("")}</div>`;
    h+=`<button class="exhibit-btn" id="exhibitBtn">🎨 디지털 사진전 페이지 만들기</button>`;}
  return h;}
function qPhotoArea(){if(!state.qPhoto)return `<div class="photo-drop"><span class="big">📸</span><b>생물 사진 올리기</b>
    <div class="pickbtns"><button class="pickbtn cam" id="qCam">📷 사진 찍기</button><button class="pickbtn alb" id="qAlb">🖼️ 앨범에서 고르기</button></div></div>`;
  return `<div class="photo-wrap"><img src="${state.qPhoto}" data-zoom="${state.qPhoto}"><button class="photo-x" id="qRm">✕</button></div>`;}
function qAiArea(){if(!state.qPhoto)return"";
  let h=`<button class="ai-btn" id="qAiBtn" ${state.qAiState==='loading'?'disabled':''}>${state.qAiState==='loading'?'🔎 종을 분석하는 중…':'🔎 AI로 종 자동 찾기'}</button>`;
  if(state.qAiState==="error")h+=`<div class="ai-note">🤖 AI 종 찾기에 실패했어요. 종 이름은 직접 적어도 돼요 🙂<br>브라우저에서 쓰려면 상단 <b>🔑 AI</b> 버튼에서 <b>Claude 또는 Gemini 키</b>를 넣어주세요.<br><span class="errdet">오류: ${esc(state.qAiErr||"알 수 없음")}</span></div>`;
  if(state.qAiState==="ok"&&state.qAiRes){const r=state.qAiRes;h+=`<div class="ai-res ${r.identified?'':'dim'}">`;
    if(r.identified){h+=`<div class="ai-top"><b>${esc(r.common_name)}</b><span class="conf c-${r.confidence}">${esc(r.confidence)}</span></div>`;
      if(r.scientific_name)h+=`<div class="ai-sci">${esc(r.scientific_name)} · ${esc(r.group)}</div>`;if(r.features)h+=`<p>${esc(r.features)}</p>`;
      if(r.indicator)h+=`<p class="ai-ind">🌊 ${esc(r.indicator)}</p>`;h+=dexLinksHTML(r.common_name);h+=`<button class="apply-btn" id="qApply">✓ 종 이름으로 넣기</button>`;}
    else h+=`<b>정확한 식별이 어려워요</b><p>${esc(r.features)}</p>`;h+=`<div class="disc">AI 추정 결과예요. 도감으로 꼭 교차 확인해요!</div></div>`;}
  return h;}
function refView(){return DEX_REF.map(g=>`<div class="refgroup"><h4>${g.emoji} ${g.group} <span class="rcount">${g.items.length}</span></h4>
  ${g.items.map(it=>{const q=encodeURIComponent(it.name);const cat=g.group.startsWith("풀")?"plant":"animal";
    const tc=it.tag&&it.tag.includes("외래")?"#E0567A":it.tag&&it.tag.includes("멸종")?"#E8912F":it.tag&&(it.tag.includes("지표")||it.tag.includes("청정")||it.tag.includes("양호")||it.tag.includes("정화"))?"#3E9E7A":"#8AA0D8";
    return `<div class="refitem"><div class="rn">${it.name}${it.tag?`<span class="rtag" style="background:${tc}">${it.tag}</span>`:""}</div><div class="rnote">${it.note}</div>
    <div class="ract"><a href="https://search.naver.com/search.naver?query=${q}" target="_blank" rel="noopener">📖 네이버</a>
      <a href="https://www.google.com/search?tbm=isch&q=${q}" target="_blank" rel="noopener">🖼️ 이미지</a>
      <button class="addref" data-refadd="${esc(it.name)}" data-refcat="${cat}">＋ 이 종으로 추가</button></div></div>`;}).join("")}</div>`).join("")
  +`<p style="font-size:11.5px;color:var(--muted);text-align:center;padding:6px 12px 0;line-height:1.6">장지천·창곡천이 흘러드는 <b>탄천 수계</b>와 이런 도시하천에서 관찰될 수 있는 대표 생물이에요.<br>실제 관찰로 우리만의 도감을 채워봐요! 🌱</p>`;}
function wireDex(){
  document.querySelectorAll("[data-dex]").forEach(b=>b.onclick=()=>{state.dexTab=b.dataset.dex;renderView();});
  wireQPick();
  const onQ=async e=>{const f=e.target.files&&e.target.files[0];if(!f)return;try{state.qPhoto=await processImage(f);state.qAiState="idle";state.qAiRes=null;refreshQ();}catch(_){toast("사진을 불러오지 못했어요");}e.target.value="";};
  const qf=document.getElementById("qFileIn");if(qf)qf.onchange=onQ;
  const qfg=document.getElementById("qFileInGal");if(qfg)qfg.onchange=onQ;
  wireQAI();
  const qs=document.getElementById("q_species");if(qs)qs.oninput=e=>state.qSpecies=e.target.value;
  const qn=document.getElementById("q_note");if(qn)qn.oninput=e=>state.qNote=e.target.value;
  document.querySelectorAll("[data-qcat]").forEach(b=>b.onclick=()=>{state.qCat=b.dataset.qcat;refreshQFields();});
  const sv=document.getElementById("qSave");if(sv)sv.onclick=saveSpeciesEntry;
  const ex=document.getElementById("exhibitBtn");if(ex)ex.onclick=exportExhibit;
  document.querySelectorAll("[data-open]").forEach(c=>c.onclick=()=>openGalleryDetail(c.dataset.open));
  document.querySelectorAll("[data-refadd]").forEach(b=>b.onclick=()=>{state.qSpecies=b.dataset.refadd;state.qCat=b.dataset.refcat;state.dexTab="gallery";renderView();toast("빠른 추가에 넣었어요 ✏️");window.scrollTo({top:0,behavior:"smooth"});});}
function refreshQ(){document.getElementById("qPhotoArea").innerHTML=qPhotoArea();document.getElementById("qAiArea").innerHTML=qAiArea();
  wireQPick();wireQAI();wireZoom();}
function wireQPick(){const c=document.getElementById("qCam");if(c)c.onclick=()=>document.getElementById("qFileIn").click();
  const a=document.getElementById("qAlb");if(a)a.onclick=()=>document.getElementById("qFileInGal").click();
  const r=document.getElementById("qRm");if(r)r.onclick=()=>{state.qPhoto=null;state.qAiRes=null;state.qAiState="idle";refreshQ();};}
function refreshQFields(){document.querySelectorAll("[data-qcat]").forEach(b=>b.classList.toggle("on",b.dataset.qcat===state.qCat));}
function wireQAI(){const b=document.getElementById("qAiBtn");
  if(b)b.onclick=async()=>{if(!state.qPhoto)return;state.qAiState="loading";refreshQ();
    try{const r=await identifySpecies(state.qPhoto,state.qCat);state.qAiRes=r;state.qAiState="ok";if(r.identified&&r.common_name){state.qSpecies=r.common_name;const g=(r.group||"");state.qCat=g==="식물"?"plant":(g==="기타"?"etc":"animal");}}
    catch(e){state.qAiState="error";state.qAiErr=(e&&e.message)||String(e);}refreshQ();const qs=document.getElementById("q_species");if(qs)qs.value=state.qSpecies;refreshQFields();};
  const ap=document.getElementById("qApply");if(ap)ap.onclick=()=>{state.qSpecies=state.qAiRes.common_name;const qs=document.getElementById("q_species");if(qs)qs.value=state.qSpecies;toast("종 이름을 넣었어요 ✓");};}
async function saveSpeciesEntry(){if(state.readonly){toast("손님은 저장할 수 없어요 🙂");return;}
  if(!state.qSpecies&&!state.qPhoto){toast("사진을 넣거나 종 이름을 적어줘요 🌱");return;}
  const obs={id:uid(),ts:Date.now(),category:state.qCat,who:state.who,site:state.site.name,location:siteLoc(),
    fields:{...emptyDraft(),species:state.qSpecies,note:state.qNote},photo:state.qPhoto,ai:state.qAiRes,
    weather:state.weather?{temp:state.weather.temperature_2m,humidity:state.weather.relative_humidity_2m,precip:state.weather.precipitation,wind:state.weather.wind_speed_10m,code:state.weather.weather_code}:null};
  state.observations.unshift(obs);await store.set("wsp_obs_"+obs.id,obs,true);
  state.qPhoto=null;state.qAiRes=null;state.qAiState="idle";state.qSpecies="";state.qNote="";
  renderView();renderNav();toast("사진전에 추가했어요! 🖼️");}
function openGalleryDetail(id){const o=state.observations.find(x=>x.id===id);if(!o)return;const f=o.fields||{};
  const ov=document.getElementById("overlay");
  ov.innerHTML=`<div class="zoom" id="zc"><img src="${o.photo}"><div class="zmeta">
    <b>${esc(f.species||f.title||CATS[o.category].full)}</b>${o.ai&&o.ai.scientific_name?`<div class="zsci">${esc(o.ai.scientific_name)}</div>`:""}
    <p>${CATS[o.category].emoji} ${CATS[o.category].full} · 촬영 ${esc(o.who||"")} · ${dayKey(o.ts)} · ${esc(o.site||"")}</p>
    ${o.ai&&o.ai.indicator?`<p>🌊 ${esc(o.ai.indicator)}</p>`:""}${f.note?`<p>${esc(f.note)}</p>`:""}
    ${dexLinksHTML(f.species||"")}</div></div>`;
  document.getElementById("zc").onclick=e=>{if(e.target.tagName!=="A")ov.innerHTML="";};}

/* ===== 일지 ===== */
async function loadAllObs(){const map={};
  for(const sh of [true,false]){let keys=[];try{keys=await store.list("wsp_obs_",sh);}catch(e){}
    for(const k of keys){try{const v=await store.get(k,sh);if(v)map[v.id]=v;}catch(e){}}}
  state.observations=Object.values(map).sort((a,b)=>b.ts-a.ts);}
async function reloadObs(){await loadAllObs();renderHeroBio();renderNav();}
function teamDashboard(){
  const total=state.observations.length;
  const counts=WHO.map(w=>({w,n:state.observations.filter(o=>o.who===w).length}));
  const chips=[["","전체"]].concat(WHO.map(w=>[w,w])).map(([val,label])=>{const on=(state.filterWho||"")===val;return `<button class="fchip ${on?'on':''}" data-fw="${val}">${label}</button>`;}).join("");
  return `<div class="card"><div class="card-title"><span class="em">📊</span> 팀 대시보드<span class="r">함께 보는 기록 ${total}건</span></div>
    ${bioGuide("최영현·박현정·이정연이 올린 걸 여기서 다 같이 봐요! 🤝")}
    <div class="dash-grid">${counts.map(c=>`<div class="dash-cell"><span class="dot" style="background:${whoDot(c.w)}"></span><b>${c.n}</b><span>${esc(c.w)}</span></div>`).join("")}
      <div class="dash-cell"><span class="se">🖼️</span><b>${state.observations.filter(o=>o.photo).length}</b><span>사진</span></div></div>
    <div class="fchips">${chips}</div>

    <div class="seg gate-seg"><button data-lm="editor" class="${state.loginMode==='editor'?'on':''}">✏️ 팀원 (편집)</button><button data-lm="guest" class="${state.loginMode==='guest'?'on':''}">👀 손님 (둘러보기)</button></div>

function wireGate(){
  document.querySelectorAll("[data-lm]").forEach(b=>b.onclick=()=>{state.loginMode=b.dataset.lm;renderGate();});
  document.querySelectorAll("[data-ln]").forEach(b=>b.onclick=()=>{state.loginName=b.dataset.ln;renderGate();});
  const pw=document.getElementById("pwIn");if(pw){pw.oninput=e=>state.loginPw=e.target.value;pw.onkeydown=e=>{if(e.key==="Enter")tryLogin();};}
  const go=document.getElementById("gateGo");if(go)go.onclick=tryLogin;
  const gg=document.getElementById("gateGuest");if(gg)gg.onclick=()=>enter("guest",null);}
function tryLogin(){const msg=document.getElementById("gateMsg");
  if(!WHO.includes(state.loginName)){if(msg)msg.textContent="이름을 먼저 골라줘!";return;}
  if(state.loginPw!=="2144"){if(msg)msg.textContent="비밀번호가 달라요 🥺";const c=document.getElementById("gateCard");c.classList.remove("shake");void c.offsetWidth;c.classList.add("shake");return;}
  enter("editor",state.loginName);}
function enter(role,name){state.auth={role,name};state.readonly=role==="guest";if(name)state.who=name;
  state.tab=role==="guest"?"log":"record";state.dexTab="gallery";state.loginPw="";
  document.getElementById("gate").className="gone";
  renderSiteTabs();renderUserBar();renderNav();renderView();}
function renderUserBar(){const el=document.getElementById("userbar");if(!el)return;
  if(!state.auth){el.innerHTML="";return;}const ed=state.auth.role==="editor";
  el.innerHTML=`<span class="ub-who">${ed?`✏️ ${esc(state.auth.name)} · 편집 모드`:"👀 손님 · 둘러보기 모드"}</span>
    <button class="ub-key ${state.aiKey?'on':''}" id="ubKey">🔑 AI</button>
    <button class="ub-switch" id="ubSwitch">${ed?"나가기":"팀원으로 입장"}</button>`;
  document.getElementById("ubKey").onclick=openAiSettings;
  document.getElementById("ubSwitch").onclick=()=>{state.loginMode="editor";document.getElementById("gate").className="";renderGate();};}
function openAiSettings(){const o=document.getElementById("overlay");const has=!!state.aiKey;
  o.innerHTML=`<div class="modal-bg" id="aiBg"><div class="modal" id="aiModal">

    <input id="aiKeyIn" class="modal-in" placeholder="키 붙여넣기 (sk-ant-... 또는 AIza...)" value="${esc(state.aiKey)}">
    <div class="modal-row"><button class="modal-save" id="aiKeySave">💾 저장</button>${has?`<button class="modal-del" id="aiKeyDel">키 삭제</button>`:""}</div>
    <div class="modal-status">${has?"✅ 키가 저장돼 있어요. AI 종 찾기를 쓸 수 있어요!":"⚠️ 아직 키가 없어요 (키가 없어도 종 이름은 직접 입력 가능해요)"}</div>
    <p class="modal-note">키는 이 기기(브라우저)에만 저장돼요. 여러 사람에게 배포할 땐 Google에서 사용량 한도를 걸어두는 걸 권장해요.</p>
    <button class="modal-x" id="aiCloseBtn">닫기</button></div></div>`;
  const close=()=>{o.innerHTML="";};
  document.getElementById("aiBg").onclick=close;
  document.getElementById("aiModal").onclick=e=>e.stopPropagation();
  document.getElementById("aiCloseBtn").onclick=close;
  document.getElementById("aiKeySave").onclick=async()=>{state.aiKey=document.getElementById("aiKeyIn").value.trim();await store.set("wsp_ai_key",state.aiKey);renderUserBar();toast("AI 키를 저장했어요 🔑");close();};
  const del=document.getElementById("aiKeyDel");if(del)del.onclick=async()=>{state.aiKey="";await store.del("wsp_ai_key");renderUserBar();toast("키를 삭제했어요");close();};}
